function getCol(row,key){
  const k=Object.keys(row).find(k=>k.trim()===key.trim());
  return k?String(row[k]||'').trim():'';
}

function applyJitter(list,proj){
  const R=16;
  const groups={};
  list.forEach(p=>{
    if(!p.coords)return;
    const[cx,cy]=proj([p.coords[1],p.coords[0]]);
    const key=`${Math.round(cx)},${Math.round(cy)}`;
    if(!groups[key])groups[key]=[];
    groups[key].push(p);
  });
  const out={};
  Object.values(groups).forEach(grp=>{
    const n=grp.length;
    grp.forEach((p,i)=>{
      const[cx,cy]=proj([p.coords[1],p.coords[0]]);
      if(n===1){out[p.id]=[cx,cy];}
      else{
        const angle=(2*Math.PI/n)*i-Math.PI/2;
        const r=n===2?R*0.6:R;
        out[p.id]=[cx+r*Math.cos(angle),cy+r*Math.sin(angle)];
      }
    });
  });
  return out;
}

function geocode(city,country){
  if(city){
    for(const c of city.split(/[\/,]/)){
      const t=c.trim();
      const k=Object.keys(GC).find(k=>k.toLowerCase()===t.toLowerCase());
      if(k){const[la,lo]=GC[k].split(',');return[+la,+lo];}
    }
  }
  if(country){
    const t=country.trim();
    const k=Object.keys(GC).find(k=>k.toLowerCase()===t.toLowerCase());
    if(k){const[la,lo]=GC[k].split(',');return[+la,+lo];}
  }
  return null;
}

const isDark=matchMedia('(prefers-color-scheme: dark)').matches;
const LAND=isDark?'#2a4055':'#c8dfc8',BORDER=isDark?'#3a5060':'#9ab89a',WATER=isDark?'#1a2a35':'#cfe6f0';
const DOT='#1D9E75',DOT_S=isDark?'#1a2a35':'#fff',HOVER=isDark?'#3a5570':'#a8cfa8',ACTIVE_C=isDark?'#1D9E75':'#9FE1CB';
const W=900,H=460;
const svg=d3.select('#map-svg').attr('viewBox',`0 0 ${W} ${H}`);
svg.append('rect').attr('width',W).attr('height',H).attr('fill',WATER);
const gLand=svg.append('g'),gDots=svg.append('g');
let projection=d3.geoNaturalEarth1().scale(153).translate([W/2,H/2]);
let pathGen=d3.geoPath(projection);
let allData=[],filtered=[],activeId=null,currentView='world',loggedInPhone=null;

function parseParticipants(raw){
  return raw.map((r,i)=>{
    const phone  =getCol(r,'WhatsApp number (with country code, e.g. +48 600 000 000)').replace(/[\s+]/g,'');
    const name   =getCol(r,"First name (and last name or nickname if you'd like)");
    const from   =getCol(r,'Where are you from originally? (city and/or country)');
    const city   =getCol(r,'Where do you live or spend most of your time? (city)');
    const country=getCol(r,'Country');
    const bio    =getCol(r,'One sentence about yourself — or a quote, a motto, anything (optional)');
    const consent=getCol(r,'May I show your name and location on the group map?');
    const coords =geocode(city,country);
    return{id:i+1,phone,name,from,city,country,bio,consent,coords};
  }).filter(p=>p.phone&&p.coords);
}

async function loadData(){
  document.getElementById('side-count').textContent='loading...';
  document.getElementById('contact-list').innerHTML='<div style="padding:16px 12px;font-size:12px;color:var(--color-text-tertiary);">Loading...</div>';
  try{
    const res=await fetch(SHEET_URL);
    const raw=await res.json();
    allData=parseParticipants(raw);
    filtered=[...allData];
    renderDots(filtered);renderList(filtered);initFilter();
  }catch(e){
    document.getElementById('contact-list').innerHTML='<div style="padding:16px 12px;font-size:12px;color:var(--color-text-tertiary);">Could not load. Try Refresh.</div>';
  }
}

function initFilter(){
  const sel=document.getElementById('country-filter');
  sel.innerHTML='<option value="">All countries</option>';
  [...new Set(allData.map(p=>p.country).filter(Boolean))].sort().forEach(c=>{
    const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);
  });
}

function cbc(list){const m={};list.forEach(p=>{if(p.country)m[p.country]=(m[p.country]||0)+1;});return m;}

function renderList(list){
  const el=document.getElementById('contact-list');
  if(!list.length){el.innerHTML='<div style="padding:16px 12px;font-size:12px;color:var(--color-text-tertiary);">No participants yet.</div>';document.getElementById('side-count').textContent='0 people';return;}
  el.innerHTML='';
  list.forEach(p=>{
    const div=document.createElement('div');
    div.className='cc'+(p.id===activeId?' active':'');
    const loc=[p.city,p.country].filter(Boolean).join(', ');
    div.innerHTML=`<p class="cn">${p.name||'—'}</p><p class="cl">${loc}</p>${p.bio?`<p class="cb">"${p.bio}"</p>`:''}`;
    div.onclick=()=>selectPerson(p.id);
    el.appendChild(div);
  });
  document.getElementById('side-count').textContent=list.length+' people';
}

function renderDots(list){
  gDots.selectAll('g.dot').remove();
  const pos=applyJitter(list,projection);
  list.forEach(p=>{
    if(!p.coords)return;
    const xy=pos[p.id];if(!xy)return;
    const[cx,cy]=xy;
    if(cx<0||cx>W||cy<0||cy>H)return;
    const g=gDots.append('g').attr('class','dot').attr('transform',`translate(${cx},${cy})`).style('cursor','pointer');
    g.append('circle').attr('r',p.id===activeId?10:7).attr('fill',DOT).attr('stroke',DOT_S).attr('stroke-width',1.5);
    if(p.name)g.append('text').attr('text-anchor','middle').attr('dy','-11').attr('font-size','9.5').attr('font-weight','500').attr('fill',isDark?'#9FE1CB':'#085041').text(p.name.split(' ')[0]);
    g.on('click',(e)=>{e.stopPropagation();selectPerson(p.id);});
  });
}

function selectPerson(id){
  activeId=activeId===id?null:id;
  renderDots(filtered);renderList(filtered);
  const wrap=document.getElementById('detail-wrap');
  if(activeId){
    const p=allData.find(x=>x.id===activeId);
    const ini=p.name?p.name.slice(0,2).toUpperCase():'?';
    const loc=[p.city,p.country].filter(Boolean).join(', ');
    wrap.innerHTML=`<div id="detail-card">
      <div style="width:36px;height:36px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:12px;color:#085041;flex-shrink:0;">${ini}</div>
      <div style="flex:1;min-width:0;">
        <p style="margin:0 0 2px;font-size:14px;font-weight:500;color:var(--color-text-primary);">${p.name||'—'}${loggedInPhone&&p.phone===loggedInPhone?' <span style="font-size:11px;color:#0F6E56;">(you)</span>':''}</p>
        ${p.from?`<p style="margin:0 0 2px;font-size:12px;color:var(--color-text-tertiary);">From: ${p.from}</p>`:''}
        <p style="margin:0 0 3px;font-size:12px;color:var(--color-text-secondary);"><i class="ti ti-map-pin" style="font-size:11px;vertical-align:-1px;" aria-hidden="true"></i> ${loc||'—'}</p>
        ${p.bio?`<p style="margin:0 0 3px;font-size:12px;color:var(--color-text-tertiary);font-style:italic;">"${p.bio}"</p>`:''}
        ${loggedInPhone?`<p style="margin:0;font-size:12px;color:#0F6E56;"><i class="ti ti-brand-whatsapp" style="font-size:13px;vertical-align:-1px;" aria-hidden="true"></i> +${p.phone}</p>`:`<p style="margin:0;font-size:11px;color:var(--color-text-tertiary);">Log in to see phone number</p>`}
      </div>
      <button onclick="document.getElementById('detail-wrap').innerHTML='';activeId=null;renderDots(filtered);renderList(filtered);" style="font-size:11px;padding:3px 8px;" aria-label="Close">×</button>
    </div>`;
  }else{wrap.innerHTML='';}
}

function zoomToCountry(name){
  const cp=filtered.filter(p=>p.country===name&&p.coords);
  if(cp.length<2)return;
  currentView='country';
  document.getElementById('view-label').textContent=name;
  document.getElementById('zoom-bar').style.display='block';
  document.getElementById('hint-el').style.display='none';
  const lats=cp.map(p=>p.coords[0]),lons=cp.map(p=>p.coords[1]);
  const minLat=Math.min(...lats),maxLat=Math.max(...lats),minLon=Math.min(...lons),maxLon=Math.max(...lons);
  const padLat=Math.max((maxLat-minLat)*0.7,3),padLon=Math.max((maxLon-minLon)*0.7,4);
  const center=[(minLon+maxLon)/2,(minLat+maxLat)/2];
  const tmp=d3.geoNaturalEarth1().scale(153).translate([W/2,H/2]);
  const[[x0,y0],[x1,y1]]=[[minLon-padLon,minLat-padLat],[maxLon+padLon,maxLat+padLat]].map(([lo,la])=>tmp([lo,la]));
  const s=Math.min(12,0.85/Math.max((x1-x0)/W,(y1-y0)/H))*153;
  projection=d3.geoNaturalEarth1().scale(s).translate([W/2,H/2]).center(center);
  pathGen=d3.geoPath(projection);
  gLand.selectAll('path').attr('d',pathGen);
  renderDots(cp);renderList(cp);highlightCountry(name);
}

function zoomOut(){
  currentView='world';
  document.getElementById('view-label').textContent='world view';
  document.getElementById('zoom-bar').style.display='none';
  document.getElementById('hint-el').style.display='block';
  document.getElementById('country-filter').value='';
  projection=d3.geoNaturalEarth1().scale(153).translate([W/2,H/2]);
  pathGen=d3.geoPath(projection);
  gLand.selectAll('path').attr('d',pathGen);
  filtered=[...allData];activeId=null;
  document.getElementById('detail-wrap').innerHTML='';
  renderDots(filtered);renderList(filtered);highlightCountry(null);
}

function highlightCountry(name){
  gLand.selectAll('path').attr('fill',d=>{
    if(!name)return LAND;
    const n=d.properties&&d.properties.name;
    const m=CNM[name];
    return(n&&(n===m||n===name))?ACTIVE_C:LAND;
  });
}

document.getElementById('login-btn').onclick=function(){
  const raw=document.getElementById('phone-input').value.trim().replace(/[\s+]/g,'');
  const match=allData.find(p=>p.phone===raw);
  const status=document.getElementById('login-status');
  if(match){
    loggedInPhone=raw;
    status.textContent='Welcome, '+(match.name?match.name.split(' ')[0]:'+'+raw);
    status.style.color='#0F6E56';
    if(activeId)selectPerson(activeId);
  }else if(raw){
    status.textContent='Number not found';
    status.style.color='var(--color-text-secondary)';
  }
};

document.getElementById('country-filter').onchange=function(){
  const val=this.value;
  if(val){
    filtered=allData.filter(p=>p.country===val);
    activeId=null;document.getElementById('detail-wrap').innerHTML='';
    if((cbc(allData)[val]||0)>=2)zoomToCountry(val);
    else{renderDots(filtered);renderList(filtered);}
  }else{
    if(currentView!=='world')zoomOut();
    else{filtered=[...allData];renderDots(filtered);renderList(filtered);}
  }
};

document.getElementById('back-btn').onclick=zoomOut;

d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world=>{
  const features=topojson.feature(world,world.objects.countries).features;
  gLand.selectAll('path').data(features).join('path')
    .attr('d',pathGen).attr('fill',LAND).attr('stroke',BORDER).attr('stroke-width',0.4)
    .on('mouseover',function(e,d){
      if(currentView!=='world')return;
      const n=d.properties&&d.properties.name;
      const our=Object.keys(CNM).find(k=>CNM[k]===n||k===n);
      if(our&&(cbc(allData)[our]||0)>=2)d3.select(this).attr('fill',HOVER);
    })
    .on('mouseout',function(){if(currentView==='world')d3.select(this).attr('fill',LAND);})
    .on('click',(e,d)=>{
      if(currentView!=='world')return;
      const n=d.properties&&d.properties.name;
      const our=Object.keys(CNM).find(k=>CNM[k]===n||k===n);
      if(our&&(cbc(allData)[our]||0)>=2)zoomToCountry(our);
    });
  loadData();
});
</script>
